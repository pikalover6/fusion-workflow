name: Tests

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile launchers
        run: |
          python -m py_compile bin/fusion-flow.py
          python -m py_compile bin/fusion_gateway_wizard.py
      - name: Validate JSON
        run: |
          python -m json.tool .claude-plugin/plugin.json >/dev/null
          python -m json.tool settings.json >/dev/null
          python -m json.tool config/model-aliases.json >/dev/null
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Exercise documented symlink install
        run: |
          chmod +x bin/fusion-flow
          ln -s "$PWD/bin/fusion-flow" /tmp/fusion-flow
          /tmp/fusion-flow models >/dev/null

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile launchers
        run: |
          python -m py_compile bin/fusion-flow.py
          python -m py_compile bin/fusion_gateway_wizard.py
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Exercise documented copied launcher install
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force "$HOME\.local\share" | Out-Null
          Copy-Item "$PWD" "$HOME\.local\share\fusion-workflow" -Recurse
          cmd /c "$PWD\bin\fusion-flow.cmd models"
