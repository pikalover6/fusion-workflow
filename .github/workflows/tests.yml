name: Tests

on:
  push:
  pull_request:

jobs:
  launcher:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile launcher
        run: python -m py_compile bin/fusion-flow.py
      - name: Validate JSON
        run: |
          python -m json.tool .claude-plugin/plugin.json >/dev/null
          python -m json.tool settings.json >/dev/null
          python -m json.tool config/model-aliases.json >/dev/null
      - name: Run tests
        run: python -m unittest discover -s tests -v
